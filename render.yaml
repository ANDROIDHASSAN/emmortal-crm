# Render Blueprint — single service: Express API + EJS website + the built
# React CRM (served at /app). One deploy, one URL, MongoDB Atlas. Cron works.
# In Render: New → Blueprint → connect this repo. Set the sync:false secrets
# in the dashboard after the service is created.
services:
  - type: web
    name: emmortal-crm
    runtime: node
    plan: free
    rootDir: .
    # install deps, then build the client so the server can serve it at /app
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # --- secrets: set these in the Render dashboard ---
      - key: MONGODB_URI            # MongoDB Atlas SRV string (URL-encode the password)
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # --- frontend wiring (fill after Vercel gives you a URL) ---
      - key: CLIENT_ORIGIN          # e.g. https://emmortal.vercel.app
        sync: false
      - key: CRM_URL                # e.g. https://emmortal.vercel.app/login
        sync: false
      - key: PUBLIC_BASE_URL        # the Render URL, e.g. https://emmortal-crm-api.onrender.com
        sync: false
      # --- optional integrations ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LEADS_NOTIFY_EMAIL
        sync: false
      - key: BACKUP_NOTIFY_EMAIL
        sync: false
      - key: TALLY_HTTP_URL
        sync: false
      - key: ESSL_PUSH_TOKEN
        sync: false
      - key: SEED_ADMIN_EMAIL
        value: admin@emmortal.local
      - key: SEED_ADMIN_PASSWORD
        sync: false
